# LLM Models - Small Class
# ≤8B models, consumer GPU friendly with excellent efficiency

modules:
  - id: deepseek-r1-8b
    name: "DeepSeek-R1 8B"
    description: "Distilled R1 on Llama3. Complex reasoning on consumer GPU"
    time_minutes: 4
    script: model-deepseek-r1-8b
    category: LLM-Small
    size: "~5GB"
    dependencies:
      - ollama

  - id: llama-3.3-8b
    name: "Llama 3.3 8B"
    description: "Meta's efficient workhorse. Great all-rounder"
    time_minutes: 4
    script: model-llama-3.3-8b
    category: LLM-Small
    size: "~5GB"
    dependencies:
      - ollama

  - id: qwen3-8b
    name: "Qwen3 8B"
    description: "Strong multilingual. 119 languages, thinking mode"
    time_minutes: 4
    script: model-qwen3-8b
    category: LLM-Small
    size: "~5GB"
    dependencies:
      - ollama

  - id: mistral-7b
    name: "Mistral 7B"
    description: "Fast & capable. Excellent coding, technical tasks"
    time_minutes: 3
    script: model-mistral-7b
    category: LLM-Small
    size: "~4GB"
    dependencies:
      - ollama

  - id: deepseek-r1-7b
    name: "DeepSeek-R1 7B"
    description: "Distilled R1 on Qwen2.5. Reasoning at 7B"
    time_minutes: 3
    script: model-deepseek-r1-7b
    category: LLM-Small
    size: "~4GB"
    dependencies:
      - ollama

  - id: qwen3-4b
    name: "Qwen3 4B"
    description: "Compact powerhouse. 256K context, edge-device friendly"
    time_minutes: 2
    script: model-qwen3-4b
    category: LLM-Small
    size: "~2.5GB"
    dependencies:
      - ollama

  - id: llama-3.2-3b
    name: "Llama 3.2 3B"
    description: "Tiny but capable. 128K context, tool use"
    time_minutes: 2
    script: model-llama-3.2-3b
    category: LLM-Small
    size: "~2GB"
    dependencies:
      - ollama

  - id: deepseek-r1-1.5b
    name: "DeepSeek-R1 1.5B"
    description: "Smallest R1 distill. Reasoning on 4GB VRAM"
    time_minutes: 1
    script: model-deepseek-r1-1.5b
    category: LLM-Small
    size: "~1GB"
    dependencies:
      - ollama
