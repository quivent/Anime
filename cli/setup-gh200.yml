---
- name: Setup Lambda Ubuntu GH200 with AI/ML Stack
  hosts: all
  become: yes
  vars:
    user_home: "{{ ansible_env.HOME }}"
    ollama_models:
      - llama3.3:70b
      - qwen2.2:latest
      - mistral:latest
    comfyui_dir: "{{ user_home }}/ComfyUI"

  tasks:
    # System Updates and Base Dependencies
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install base dependencies
      apt:
        name:
          - build-essential
          - git
          - curl
          - wget
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - apt-transport-https
          - unzip
          - vim
          - htop
          - tmux
          - gcc
          - g++
          - make
          - cmake
          - pkg-config
          - libssl-dev
          - libffi-dev
          - libbz2-dev
          - libreadline-dev
          - libsqlite3-dev
          - zlib1g-dev
          - liblzma-dev
          - libncurses5-dev
          - libgdbm-dev
          - libnss3-dev
          - tk-dev
          - uuid-dev
        state: present

    # NVIDIA Drivers and CUDA (for GH200)
    - name: Check if NVIDIA driver is installed
      command: nvidia-smi
      register: nvidia_check
      ignore_errors: yes
      changed_when: false

    - name: Add NVIDIA repository
      when: nvidia_check.rc != 0
      block:
        - name: Download NVIDIA CUDA keyring
          get_url:
            url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/arm64/cuda-keyring_1.1-1_all.deb
            dest: /tmp/cuda-keyring.deb

        - name: Install NVIDIA CUDA keyring
          apt:
            deb: /tmp/cuda-keyring.deb

        - name: Update apt cache after adding NVIDIA repo
          apt:
            update_cache: yes

        - name: Install NVIDIA drivers and CUDA toolkit
          apt:
            name:
              - cuda-toolkit-12-4
              - nvidia-driver-550
            state: present

    # Python Installation
    - name: Install Python and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
        state: present

    - name: Upgrade pip
      pip:
        name: pip
        state: latest
        executable: pip3

    - name: Install Python AI/ML libraries
      pip:
        name:
          - torch
          - torchvision
          - torchaudio
          - transformers
          - diffusers
          - accelerate
          - safetensors
          - numpy
          - scipy
          - scikit-learn
          - pandas
          - matplotlib
          - jupyter
          - ipython
          - notebook
          - tensorboard
          - opencv-python
          - pillow
          - requests
          - aiohttp
          - pyyaml
          - tqdm
          - einops
          - omegaconf
          - kornia
          - spandrel
          - soundfile
          - sentencepiece
          - protobuf
          - onnx
          - onnxruntime-gpu
          - xformers
        executable: pip3
        extra_args: --index-url https://download.pytorch.org/whl/cu124

    # Node.js and npm
    - name: Download NodeSource setup script
      get_url:
        url: https://deb.nodesource.com/setup_20.x
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Run NodeSource setup script
      command: bash /tmp/nodesource_setup.sh
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js and npm
      apt:
        name:
          - nodejs
        state: present
        update_cache: yes

    - name: Install global npm packages
      npm:
        name: "{{ item }}"
        global: yes
      loop:
        - yarn
        - pnpm
        - pm2
        - typescript
        - ts-node

    # Ollama Installation
    - name: Check if Ollama is installed
      command: which ollama
      register: ollama_check
      ignore_errors: yes
      changed_when: false

    - name: Install Ollama
      when: ollama_check.rc != 0
      shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Create Ollama systemd service
      copy:
        dest: /etc/systemd/system/ollama.service
        content: |
          [Unit]
          Description=Ollama Service
          After=network-online.target

          [Service]
          ExecStart=/usr/local/bin/ollama serve
          User=root
          Group=root
          Restart=always
          RestartSec=3
          Environment="OLLAMA_HOST=0.0.0.0:11434"
          Environment="OLLAMA_MODELS=/usr/share/ollama/.ollama/models"

          [Install]
          WantedBy=default.target

    - name: Enable and start Ollama service
      systemd:
        name: ollama
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for Ollama to be ready
      wait_for:
        port: 11434
        delay: 5
        timeout: 60

    - name: Pull Ollama models
      command: "ollama pull {{ item }}"
      loop: "{{ ollama_models }}"
      async: 3600
      poll: 0
      register: ollama_pull_jobs

    - name: Wait for Ollama model pulls to complete
      async_status:
        jid: "{{ item.ansible_job_id }}"
      register: job_result
      until: job_result.finished
      retries: 360
      delay: 10
      loop: "{{ ollama_pull_jobs.results }}"

    # ComfyUI Installation
    - name: Clone ComfyUI repository
      become_user: "{{ ansible_user_id }}"
      git:
        repo: https://github.com/comfyanonymous/ComfyUI.git
        dest: "{{ comfyui_dir }}"
        version: master
        force: no

    - name: Install ComfyUI dependencies
      become_user: "{{ ansible_user_id }}"
      pip:
        requirements: "{{ comfyui_dir }}/requirements.txt"
        executable: pip3

    - name: Create ComfyUI custom nodes directory
      become_user: "{{ ansible_user_id }}"
      file:
        path: "{{ comfyui_dir }}/custom_nodes"
        state: directory
        mode: '0755'

    - name: Clone ComfyUI Manager
      become_user: "{{ ansible_user_id }}"
      git:
        repo: https://github.com/ltdrdata/ComfyUI-Manager.git
        dest: "{{ comfyui_dir }}/custom_nodes/ComfyUI-Manager"
        version: main

    # Claude Code Installation
    - name: Check if Claude Code is installed
      command: which claude-code
      register: claude_check
      ignore_errors: yes
      changed_when: false
      become_user: "{{ ansible_user_id }}"

    - name: Install Claude Code via npm
      when: claude_check.rc != 0
      npm:
        name: "@anthropic-ai/claude-code"
        global: yes
        state: present

    # Docker (optional but useful for AI workloads)
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=arm64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    # Additional AI Tools
    - name: Install Hugging Face CLI
      pip:
        name:
          - huggingface-hub
          - datasets
        executable: pip3

    - name: Install additional ML tools
      pip:
        name:
          - wandb
          - mlflow
          - ray
          - deepspeed
          - bitsandbytes
          - peft
          - trl
        executable: pip3

    # System optimizations for GH200
    - name: Set system limits for performance
      pam_limits:
        domain: '*'
        limit_type: "{{ item.type }}"
        limit_item: "{{ item.item }}"
        value: "{{ item.value }}"
      loop:
        - { type: 'soft', item: 'nofile', value: '65536' }
        - { type: 'hard', item: 'nofile', value: '65536' }
        - { type: 'soft', item: 'nproc', value: '65536' }
        - { type: 'hard', item: 'nproc', value: '65536' }

    - name: Create startup script
      copy:
        dest: "{{ user_home }}/start-services.sh"
        mode: '0755'
        content: |
          #!/bin/bash

          # Start Ollama if not running
          if ! systemctl is-active --quiet ollama; then
              sudo systemctl start ollama
          fi

          # Start ComfyUI
          cd {{ comfyui_dir }}
          python3 main.py --listen 0.0.0.0 --port 8188 > /tmp/comfyui.log 2>&1 &

          echo "Services started!"
          echo "ComfyUI: http://localhost:8188"
          echo "Ollama: http://localhost:11434"

    - name: Display completion message
      debug:
        msg:
          - "Lambda GH200 setup complete!"
          - "Installed components:"
          - "  - NVIDIA Drivers and CUDA Toolkit"
          - "  - Python 3 with AI/ML libraries (PyTorch, Transformers, etc.)"
          - "  - Node.js {{ nodejs_version | default('20.x') }} and npm"
          - "  - Ollama with models: {{ ollama_models | join(', ') }}"
          - "  - ComfyUI at {{ comfyui_dir }}"
          - "  - Claude Code CLI"
          - "  - Docker and Docker Compose"
          - ""
          - "To start services, run: ~/start-services.sh"
          - "Note: You may need to log out and back in for group changes to take effect"

  handlers:
    - name: Reboot system
      reboot:
        msg: "Rebooting to apply kernel updates"
        reboot_timeout: 300
